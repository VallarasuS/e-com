<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Admin - Products</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
    <style>
        body { background: #0a0a0a; }
        .admin-layout { display: flex; height: 100vh; overflow: hidden; }
        .admin-sidebar { width: 250px; background: #16181c; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; flex-shrink: 0;}
        .admin-sidebar .logo { font-size: 24px; font-weight: bold; text-align: center; padding: 20px; border-bottom: 1px solid var(--border-color); color: var(--primary-color); }
        .admin-sidebar a { display: block; padding: 15px 20px; color: var(--text-color); border-bottom: 1px solid #222; text-decoration: none; }
        .admin-sidebar a:hover, .admin-sidebar a.active { background: #333; }
        
        .admin-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .data-table { width: 100%; border-collapse: collapse; background: #16181c; border-radius: var(--radius); overflow: hidden; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        .data-table th { background: #222; }
        
        /* Modal Styles for Automation Scenario */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { background-color: var(--card-bg); margin: 10% auto; padding: 30px; border: 1px solid var(--border-color); border-radius: var(--radius); width: 50%; max-width: 600px; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-btn:hover { color: white; }
    </style>
</head>
<body>

    <div class="admin-layout">
        
        <!-- SIDEBAR -->
        <div class="admin-sidebar" id="admin-sidebar" data-testid="admin-sidebar">
            <div class="logo">NEO ADMIN</div>
            <a id="nav-admin-dash" data-testid="nav-admin-dash" href="./admin-dashboard.html">Dashboard</a>
            <a id="nav-admin-prod" data-testid="nav-admin-prod" href="./admin-products.html" class="active">Products</a>
            <a id="nav-admin-ord" data-testid="nav-admin-ord" href="#">Orders</a>
            <a id="nav-admin-cust" data-testid="nav-admin-cust" href="#">Customers</a>
            <a id="nav-admin-settings" data-testid="nav-admin-settings" href="#">Settings</a>
            <div style="flex-grow: 1;"></div>
            <a id="nav-admin-logout" data-testid="nav-admin-logout" href="./index.html" style="background: #a10000; text-align: center;">Logout</a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="admin-content">
            <div class="admin-header">
                <h2>Product Management</h2>
                <button type="button" id="btn-add-product" data-testid="btn-add-product" onclick="openModal()">+ Add New Product</button>
            </div>

            <!-- AUTOMATION SCENARIO: CRUD TABLE -->
            <table class="data-table" id="product-table" data-testid="product-table">
                <thead>
                    <tr>
                        <th id="th-pid" data-testid="th-pid"><input type="checkbox" id="selectAll" data-testid="selectAll"></th>
                        <th id="th-pname" data-testid="th-pname">Product Name</th>
                        <th id="th-pcat" data-testid="th-pcat">Category</th>
                        <th id="th-pprice" data-testid="th-pprice">Price</th>
                        <th id="th-pstock" data-testid="th-pstock">Stock</th>
                        <th id="th-pacts" data-testid="th-pacts">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr id="row-prod-1" data-testid="row-prod-1">
                        <td><input type="checkbox" class="row-chk"></td>
                        <td>Gaming Console</td>
                        <td>Electronics</td>
                        <td>$399.00</td>
                        <td>45</td>
                        <td>
                            <button type="button" id="btn-edit-1" data-testid="btn-edit-1" onclick="openModal('Gaming Console', 'Electronics', 399.00, 45)" style="padding: 5px 10px; font-size: 12px; background: #444;">Edit</button>
                            <button type="button" id="btn-del-1" data-testid="btn-del-1" onclick="if(confirm('Delete product?')) this.closest('tr').remove();" style="padding: 5px 10px; font-size: 12px; background: #a10000;">Del</button>
                        </td>
                    </tr>
                    <tr id="row-prod-2" data-testid="row-prod-2">
                        <td><input type="checkbox" class="row-chk"></td>
                        <td>Casual Jacket</td>
                        <td>Fashion</td>
                        <td>$89.99</td>
                        <td>120</td>
                        <td>
                            <button type="button" id="btn-edit-2" data-testid="btn-edit-2" onclick="openModal('Casual Jacket', 'Fashion', 89.99, 120)" style="padding: 5px 10px; font-size: 12px; background: #444;">Edit</button>
                            <button type="button" id="btn-del-2" data-testid="btn-del-2" onclick="if(confirm('Delete product?')) this.closest('tr').remove();" style="padding: 5px 10px; font-size: 12px; background: #a10000;">Del</button>
                        </td>
                    </tr>
                </tbody>
            </table>
            
        </div>

    </div>

    <!-- AUTOMATION SCENARIO: MODAL POPUP -->
    <div id="productModal" class="modal" data-testid="productModal">
        <div class="modal-content">
            <span class="close-btn" id="modal-close" data-testid="modal-close" onclick="closeModal()">&times;</span>
            <h3 id="modal-title" style="margin-top: 0;">Add / Edit Product</h3>
            
            <form id="prod-form" data-testid="prod-form" onsubmit="event.preventDefault(); alert('Product Saved Successfully!'); closeModal();">
                <label>Product Name</label>
                <input type="text" id="modal-pname" name="modal-pname" data-testid="modal-pname" required>
                
                <label>Category</label>
                <select id="modal-pcat" name="modal-pcat" data-testid="modal-pcat" required>
                    <option value="Electronics">Electronics</option>
                    <option value="Fashion">Fashion</option>
                    <option value="Toys">Toys</option>
                </select>
                
                <div class="flex-row">
                    <div style="width: 50%;">
                        <label>Price ($)</label>
                        <input type="number" step="0.01" id="modal-pprice" name="modal-pprice" data-testid="modal-pprice" required>
                    </div>
                    <div style="width: 50%;">
                        <label>Stock Quantity</label>
                        <input type="number" id="modal-pstock" name="modal-pstock" data-testid="modal-pstock" required>
                    </div>
                </div>
                
                <button type="submit" id="modal-save" data-testid="modal-save" class="fill-width" style="margin-top: 20px;">Save Product</button>
            </form>
        </div>
    </div>

    <script>
        function openModal(name='', cat='Electronics', price='', stock='') {
            document.getElementById('modal-pname').value = name;
            document.getElementById('modal-pcat').value = cat;
            document.getElementById('modal-pprice').value = price;
            document.getElementById('modal-pstock').value = stock;
            document.getElementById('productModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }
        
        // Select all functionality for automation test scenarios
        document.getElementById('selectAll').addEventListener('change', function() {
            let checkboxes = document.querySelectorAll('.row-chk');
            checkboxes.forEach(chk => chk.checked = this.checked);
        });
    </script>

</body>
</html>
