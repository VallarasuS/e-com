<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo - Wishlist</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
    <style>
        .profile-layout { display: flex; gap: 30px; margin-top: 30px; }
        .sidebar-menu { width: 250px; flex-shrink: 0; }
        .sidebar-menu a { display: block; padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 16px; font-weight: bold; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: var(--button-bg); color: var(--button-text); }
        .profile-content { flex-grow: 1; }
        /* Automation Scenario: Drag and Drop list ordering */
        .wishlist-item { padding: 15px; border: 1px solid var(--border-color); margin-bottom: 10px; border-radius: 5px; cursor: grab; background: #222;}
    </style>
</head>
<body>
    <nav>
        <div class="flex-row">
            <div class="flex-row between fill-width" style="margin: auto;">
                <div class="flex-row" style="align-items: center;">
                    <a id="nav-home" name="nav-home" data-testid="nav-home" style="font-weight: bold; font-size: 18px;" href="./index.html">NEO</a>
                </div>
            </div>
        </div>
    </nav>
    <main>
        <h2>My Account</h2>
        <div class="profile-layout">
            <div class="sidebar-menu card" style="padding: 0; overflow: hidden;">
                <a id="menu-profile" name="menu-profile" data-testid="menu-profile" href="./profile.html">Profile Settings</a>
                <a id="menu-orders" name="menu-orders" data-testid="menu-orders" href="./orders.html">Order History</a>
                <a id="menu-addresses" name="menu-addresses" data-testid="menu-addresses" href="./addresses.html">Addresses</a>
                <a id="menu-payments" name="menu-payments" data-testid="menu-payments" href="./payments.html">Payment Methods</a>
                <a id="menu-wishlist" name="menu-wishlist" data-testid="menu-wishlist" href="./wishlist.html" class="active">Wishlist</a>
                <a id="menu-logout" name="menu-logout" data-testid="menu-logout" href="./index.html">Logout</a>
            </div>
            <div class="profile-content card">
                <h3>My Wishlist</h3>
                <p>Drag and drop items to reorder them.</p>
                <!-- AUTOMATION SCENARIO: DRAG AND DROP -->
                <div id="wishlist-container" data-testid="wishlist-container">
                    <div class="wishlist-item" draggable="true" id="wish-1" data-testid="wish-1">1. Pro Camera Lens</div>
                    <div class="wishlist-item" draggable="true" id="wish-2" data-testid="wish-2">2. Gaming Console</div>
                    <div class="wishlist-item" draggable="true" id="wish-3" data-testid="wish-3">3. Action Figure</div>
                </div>
            </div>
        </div>
    </main>
    <script>
        // Simple drag and drop logic for automation testing
        let dragged = null;
        document.querySelectorAll('.wishlist-item').forEach(item => {
            item.addEventListener('dragstart', (e) => { dragged = e.target; e.target.style.opacity = .5; });
            item.addEventListener('dragend', (e) => { e.target.style.opacity = ""; });
            item.addEventListener('dragover', (e) => { e.preventDefault(); });
            item.addEventListener('drop', (e) => { 
                e.preventDefault(); 
                if(e.target.className === 'wishlist-item' && e.target !== dragged) {
                    let container = document.getElementById('wishlist-container');
                    let list = Array.from(container.children);
                    let targetIdx = list.indexOf(e.target);
                    let draggedIdx = list.indexOf(dragged);
                    if(targetIdx > draggedIdx) {
                        e.target.after(dragged);
                    } else {
                        e.target.before(dragged);
                    }
                }
            });
        });
    </script>
</body>
</html>
