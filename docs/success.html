<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo - Order Success</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
    <style>
        .success-box { background: var(--card-bg); padding: 50px; border-radius: var(--radius); text-align: center; margin-top: 50px; }
        .success-icon { font-size: 60px; color: var(--primary-color); margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav>
        <div class="flex-row">
            <div class="flex-row between fill-width" style="margin: auto;">
                <div class="flex-row" style="align-items: center;">
                    <a id="nav-home" name="nav-home" data-testid="nav-home" style="font-weight: bold; font-size: 18px;" href="./index.html">NEO</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="success-box card" id="success-container" data-testid="success-container">
            <div class="success-icon" id="success-icon" data-testid="success-icon">✓</div>
            <h2 id="success-title" data-testid="success-title">Order Placed Successfully!</h2>
            <p>Thank you for shopping with Neo. Your order has been registered.</p>
            
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: var(--radius); margin: 30px auto; width: 50%;">
                <p style="margin: 0;"><strong>Order Reference #:</strong> <span id="order-ref" data-testid="order-ref"></span></p>
            </div>

            <a href="./orders.html">
                <button type="button" id="btn-view-orders" name="btn-view-orders" data-testid="btn-view-orders">View My Orders</button>
            </a>
            <a href="./index.html">
                <button type="button" id="btn-continue-shop" name="btn-continue-shop" data-testid="btn-continue-shop" style="background: var(--border-color); color: white;">Continue Shopping</button>
            </a>
        </div>
    </main>

    <script>
        // Generate random order id
        document.getElementById('order-ref').innerText = "ORD-" + Math.floor(Math.random() * 900000 + 100000);
    </script>

</body>
</html>
