<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo - Shopping Cart</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
    <style>
        .cart-container { display: flex; gap: 30px; margin-top: 30px;}
        .cart-items { flex-grow: 1; }
        .cart-summary { width: 350px; flex-shrink: 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding: 15px 0; }
        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius) }
        .qty-input { width: 60px; padding: 5px; text-align: center; }
        .remove-btn { background: #ff4d4d; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: var(--radius); }
    </style>
</head>
<body>

    <nav>
        <!-- Same nav as other pages -->
        <div class="flex-row">
            <div class="flex-row between fill-width" style="margin: auto;">
                <div class="flex-row" style="align-items: center;">
                    <a id="nav-home" name="nav-home" data-testid="nav-home" style="font-weight: bold; font-size: 18px;" href="./index.html">NEO</a>
                    <a id="nav-deals" name="nav-deals" data-testid="nav-deals" class="primary" href="./shop.html">Deals</a>
                    <a id="nav-new-arrivals" name="nav-new-arrivals" data-testid="nav-new-arrivals" href="./shop.html">New Arrivals</a>
                    <a id="nav-best-sellers" name="nav-best-sellers" data-testid="nav-best-sellers" class="primary" href="./shop.html">Best Sellers</a>
                </div>
                <div class="flex-row flex-end" style="align-items: center">
                    <div class="flex-row" style="gap: 5px;">
                        <svg width="18px" height="auto" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15.7955 15.8111L21 21M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <a id="nav-search" name="nav-search" data-testid="nav-search" href="./search.html">Search</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <h2>Your Shopping Cart</h2>
        
        <div class="cart-container">
            <div class="cart-items card" id="cart-items-container">
            </div>

            <div class="cart-summary card">
                <h3>Order Summary</h3>
                <div class="flex-row between" style="margin-bottom: 10px;">
                    <span>Subtotal</span>
                    <span id="summary-subtotal" data-testid="summary-subtotal">$598.99</span>
                </div>
                <div class="flex-row between" style="margin-bottom: 10px;">
                    <span>Tax (8%)</span>
                    <span id="summary-tax" data-testid="summary-tax">$47.91</span>
                </div>
                <div class="flex-row between" style="margin-bottom: 20px; font-weight: bold; font-size: 18px; border-top: 1px solid var(--border-color); padding-top: 10px;">
                    <span>Total</span>
                    <span id="summary-total" data-testid="summary-total">$646.90</span>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="font-size: 12px;">Got a Promo Code?</label>
                    <div class="flex-row" style="gap: 5px;">
                        <input type="text" id="promo-code" name="promo-code" data-testid="promo-code" placeholder="Enter Code">
                        <button type="button" id="apply-promo-btn" name="apply-promo-btn" data-testid="apply-promo-btn">Apply</button>
                    </div>
                </div>

                <a href="./checkout.html" style="text-decoration: none;">
                    <button type="button" id="checkout-btn" name="checkout-btn" data-testid="checkout-btn" class="fill-width">Proceed to Checkout</button>
                </a>
            </div>
        </div>

    </main>

    <script>
        function removeItem(rowId) {
            if (confirm("Are you sure you want to remove this item from your cart?")) {
                var el = document.getElementById(rowId);
                if (el) {
                    el.style.display = 'none';
                    // Test scenario: In a real app we'd recalculate totals
                    document.getElementById('summary-total').innerText = "$0.00"; // Trigger change for automation check
                }
            }
        }
    </script>

</body>
</html>
