<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo - ECommerce</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
    <style>
        .page-header { text-align: center; margin: 40px 0; }
        .content-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border-color); }
        .sidebar-menu { width: 250px; flex-shrink: 0; }
        .sidebar-menu a { display: block; padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 16px; font-weight: bold; }
        .sidebar-menu a:hover, .sidebar-menu a.active { background: var(--button-bg); color: var(--button-text); }
        .profile-layout { display: flex; gap: 30px; margin-top: 30px; }
        .profile-content { flex-grow: 1; overflow-x: auto; }
    </style>
</head>
<body>
    <nav>
        <div class="flex-row">
            <div class="flex-row between fill-width" style="margin: auto;">
                <div class="flex-row" style="align-items: center;">
                    <a id="nav-home" name="nav-home" data-testid="nav-home" style="font-weight: bold; font-size: 18px;" href="./index.html">NEO</a>
                    <a id="nav-deals" name="nav-deals" data-testid="nav-deals" class="primary" href="./deals.html">Deals</a>
                    <a id="nav-new-arrivals" name="nav-new-arrivals" data-testid="nav-new-arrivals" href="./new-arrivals.html">New Arrivals</a>
                    <a id="nav-best-sellers" name="nav-best-sellers" data-testid="nav-best-sellers" class="primary" href="./best-sellers.html">Best Sellers</a>
                </div>
                <div class="flex-row flex-end" style="align-items: center">
                    <div class="flex-row" style="gap: 5px;">
                        <a id="nav-search" name="nav-search" data-testid="nav-search" href="./search.html">Search</a>
                    </div>
                    <div class="flex-row" style="gap: 5px;">
                        <a id="nav-cart" name="nav-cart" data-testid="nav-cart" href="./cart.html">Cart</a>
                    </div>
                    <div class="flex-row" style="gap: 5px;">
                        <a id="nav-login" name="nav-login" data-testid="nav-login" href="./login.html">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main>
        <div class="page-header"><h2>Request Return</h2></div>
        <div class="card form-container" style="max-width: 500px; margin: 0 auto;">
            <form id="return-form" onsubmit="event.preventDefault(); submitReturn();">
                <p>Select Reason:</p>
                <select id="ret-reason" style="width:100%; padding:10px;"><option>Defective</option><option>Wrong Item</option><option>Not Needed</option></select>
                <button type="submit" style="margin-top:15px;">Confirm Return</button>
            </form>
        </div>
        <script>
            function submitReturn() {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                let orders = JSON.parse(localStorage.getItem('orders')) || [];
                let order = orders.find(o => o.id === id);
                if(order) { order.status = 'Returned'; localStorage.setItem('orders', JSON.stringify(orders)); }
                alert("Return requested successfully."); window.location.href='./orders.html';
            }
        </script>
    
    </main>
    <div class="footer">
        <hr style="margin: 50px 0px; border-color: black;">
        <div class="footer-menu flex-row flex-start">
            <div class="card" style="background: transparent;">
                <h4 class="footer-label">About Us</h4>
                <div class="flex-col gap-10">
                    <a href="./about.html">Our Story</a>
                    <a href="./blogs.html">Blogs</a>
                </div>
            </div>
            <div class="card" style="background: transparent;">
                <h4 class="footer-label">Customer Support</h4>
                <div class="flex-col gap-10">
                    <a href="./refund-policy.html">Payments and Refund</a>
                    <a href="./shipping-policy.html">Shipping Policy</a>
                    <a href="./faq.html">FAQ</a>
                </div>
            </div>
            <div class="card" style="background: transparent;">
                <h4 class="footer-label">Contact Us</h4>
                <div class="flex-col gap-10">
                    <a href="./contact.html">Contact Us</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
