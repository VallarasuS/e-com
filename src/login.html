<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo - Login</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
</head>

<body>

    <div class="card">

        <div class="title text-center">
            <h2>Neo</h2>
            <div class="subtitle">to continue to your account</div>
        </div>

        <form id="loginForm" onsubmit="return false">
            <input id="login-user" data-testid="login-user" autocomplete="off" type="text" name="email"
                placeholder="Email or Phone" required="" autofocus="">

            <input id="login-pass" data-testid="login-pass" type="password" name="password" placeholder="Password"
                required="">

            <a href="#" class="text-right">Forgot password?</a>

            <div class="flex-row between">
                <a href="#" class="create-link">Create account</a>
                <button type="button" id="login-button" data-testid="login-button" onclick="login()">Next</button>
            </div>
        </form>

        <div class="text-center"> &gt&gt&gt user & pass: admin &lt;&lt;&lt; </div>

    </div>

</body>

</html>
